name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/sketcha.day
            git pull origin main

      - name: Checkout for IndexNow diff
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Notifies Bing/Yandex and other IndexNow engines about changed pages so
      # daily lessons get crawled same-day. Google discovers via the sitemap.
      - name: Submit changed pages to IndexNow
        continue-on-error: true
        run: python3 scripts/submit-indexnow.py --since HEAD^
